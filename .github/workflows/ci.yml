name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify release artifacts
        run: |
          test -f build/manifest.json || (echo "missing build/manifest.json" && exit 1)
          test -f build/main.js || (echo "missing build/main.js" && exit 1)
          test -f build/styles.css || (echo "missing build/styles.css" && exit 1)

      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-bundle
          path: |
            build/main.js
            build/manifest.json
            build/styles.css
          retention-days: 7
